<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>E-commerce website</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 40px;
      color: #333;
    }
    .btn-container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    a {
      text-decoration: none;
      padding: 15px 40px;
      background-color:darkcyan;
      color: white;
      font-weight: bold;
      border-radius: 8px;
      font-size: 1.2rem;
      transition: background-color 0.3s ease;
    }
    a:hover {
      background-color:darkcyan;
    }
    @media (max-width: 480px) {
      h1 {
        font-size: 2rem;
      }
      a {
        padding: 12px 30px;
        font-size: 1rem;
        width: 100%;
        box-sizing: border-box;
      }
      .btn-container {
        flex-direction: column;
        gap: 15px;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <h1>E-commerce website</h1>
  <div class="btn-container">
    <a href="signin.html">Sign In</a>
    <a href="signup.html">Sign Up</a>
  </div>
</body>
</html>
